<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Umera Logo - Pilates & Move</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;1,400&family=Plus+Jakarta+Sans:wght@500;700&display=swap" rel="stylesheet">

    <style>
        /* Paleta de colores seleccionada */
        :root {
            --color-ivory: #fbfaf7;
            --color-taupe: #b3a594;
            --color-rosa-pastel: #f7d6d8;
            --color-peach-blush: #e2a4a7;
            --color-chocolate: #362017;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--color-ivory);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        /* Contenedor del Logo */
        .brand-logo-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.2rem;
            padding: 3rem;
            background: var(--color-ivory);
        }

        /* --- Isotipo Abstracto ("Indirecto") --- */
        .abstract-icon {
            position: relative;
            width: 120px;
            height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Forma de fondo - Rosa Suave */
        .shape-back {
            position: absolute;
            width: 85px;
            height: 90px;
            background-color: var(--color-rosa-pastel);
            border-radius: 60% 40% 70% 30% / 50% 60% 40% 50%;
            transform: rotate(-15deg);
            opacity: 0.85;
            animation: floatBack 7s ease-in-out infinite alternate;
        }

        /* Forma de frente - Peach Blush */
        .shape-front {
            position: absolute;
            width: 75px;
            height: 80px;
            background-color: var(--color-peach-blush);
            border-radius: 40% 60% 35% 65% / 60% 40% 60% 40%;
            transform: rotate(20deg) translate(12px, 8px);
            mix-blend-mode: multiply; /* Intersección de color inteligente */
            animation: floatFront 7s ease-in-out infinite alternate;
        }

        /* Punto de equilibrio minimalista */
        .shape-core {
            position: absolute;
            width: 12px;
            height: 12px;
            background-color: var(--color-chocolate);
            border-radius: 50%;
            transform: translate(-8px, -4px);
            box-shadow: 0 0 0 6px var(--color-ivory);
            z-index: 10;
        }

        /* --- Tipografía Umera --- */
        .brand-text {
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
        }

        /* Nombre de la marca (Serif, elegante, Chocolate) */
        .brand-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.6rem;
            font-weight: 500;
            color: var(--color-chocolate);
            letter-spacing: 1px;
            line-height: 1;
            text-transform: capitalize;
        }

        /* La última letra en cursiva sutil para darle un toque único de diseño */
        .brand-title span {
            font-style: italic;
            font-weight: 400;
            color: var(--color-chocolate);
            margin-left: -2px;
        }

        /* Eslogan secundario (Palo Seco, limpio, espaciado) */
        .brand-tagline {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--color-taupe);
            letter-spacing: 5px;
            margin-top: 0.4rem;
        }

        /* Animaciones fluidas que simulan movimiento/respiración */
        @keyframes floatBack {
            0% { border-radius: 60% 40% 70% 30% / 50% 60% 40% 50%; transform: rotate(-15deg) translateY(0px); }
            100% { border-radius: 45% 55% 50% 50% / 60% 45% 55% 40%; transform: rotate(-8deg) translateY(-3px); }
        }

        @keyframes floatFront {
            0% { border-radius: 40% 60% 35% 65% / 60% 40% 60% 40%; transform: rotate(20deg) translate(12px, 8px); }
            100% { border-radius: 55% 45% 60% 40% / 40% 55% 45% 55%; transform: rotate(23deg) translate(10px, 5px); }
        }
    </style>
</head>
<body>

    <div class="brand-logo-container">
        
        <div class="abstract-icon">
            <div class="shape-back"></div>
            <div class="shape-front"></div>
            <div class="shape-core"></div>
        </div>

        <div class="brand-text">
            <h1 class="brand-title">Umer<span>a</span></h1>
            <p class="brand-tagline">pilates & move</p>
        </div>

    </div>

</body>
</html>
