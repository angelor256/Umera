<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Umera - Menú Minimalista</title>
    
    <!-- Fuentes elegantes de Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Plus+Jakarta+Sans:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        /* Paleta de colores oficial de Umera */
        :root {
            --color-ivory: #fbfaf7;
            --color-taupe: #b3a594;
            --color-rosa-pastel: #f7d6d8;
            --color-peach-blush: #e2a4a7;
            --color-chocolate: #362017;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--color-ivory);
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
        }

        /* --- BARRA DE NAVEGACIÓN SUPERIOR (HEADER) --- */
        .header-navigation {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 2rem;
            background-color: transparent;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 100;
        }

        .mini-logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            color: var(--color-chocolate);
            text-decoration: none;
            font-weight: 500;
            letter-spacing: 1px;
        }

        .mini-logo span {
            font-style: italic;
            color: var(--color-peach-blush);
        }

        /* Botón de abrir menú (Hamburguesa Minimalista) */
        .btn-open-menu {
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding: 0.5rem;
        }

        .btn-open-menu span {
            display: block;
            width: 28px;
            height: 2px;
            background-color: var(--color-chocolate);
            transition: all 0.3s ease;
        }

        /* --- MENÚ DESPLEGABLE CON SLIDE DESDE ARRIBA --- */
        .fullscreen-menu {
            position: fixed;
            top: -100%; /* Totalmente oculto arriba de la pantalla */
            left: 0;
            width: 100%;
            height: 100vh;
            background-color: var(--color-ivory);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            
            /* Aquí ocurre la magia del Slide de arriba para abajo */
            transition: top 0.6s cubic-bezier(0.85, 0, 0.15, 1);
        }

        /* Estado activo: se desliza a su posición final */
        .fullscreen-menu.menu-active {
            top: 0;
        }

        /* Botón cerrar dentro del menú */
        .btn-close-menu {
            position: absolute;
            top: 1.8rem;
            right: 2rem;
            background: none;
            border: none;
            font-size: 1.5rem;
            color: var(--color-chocolate);
            cursor: pointer;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: color 0.3s;
        }

        .btn-close-menu:hover {
            color: var(--color-peach-blush);
        }

        /* Enlaces del Menú Principal */
        .menu-links-list {
            list-style: none;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 1.8rem;
        }

        .menu-links-list li {
            overflow: hidden; /* Oculta el texto mientras se genera la animación interna */
        }

        .menu-item {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            font-weight: 400;
            color: var(--color-chocolate);
            text-decoration: none;
            display: block;
            position: relative;
            transition: all 0.4s ease;
            opacity: 0;
            transform: translateY(-40px); /* Los enlaces caen sutilmente desde arriba */
        }

        /* Animación para que los enlaces caigan en cascada cuando el menú se abre */
        .fullscreen-menu.menu-active .menu-item {
            opacity: 1;
            transform: translateY(0);
        }

        /* Retrasos calculados para que los enlaces caigan uno tras otro (efecto cascada) */
        .fullscreen-menu.menu-active li:nth-child(1) .menu-item { transition-delay: 0.3s; }
        .fullscreen-menu.menu-active li:nth-child(2) .menu-item { transition-delay: 0.4s; }
        .fullscreen-menu.menu-active li:nth-child(3) .menu-item { transition-delay: 0.5s; }
        .fullscreen-menu.menu-active li:nth-child(4) .menu-item { transition-delay: 0.6s; }

        /* Efecto Hover elegante y asimétrico en las opciones */
        .menu-item:hover {
            color: var(--color-peach-blush);
            transform: scale(1.05);
            font-style: italic;
        }

        /* --- DETALLE ESTÉTICO DEL MENÚ (FOOTER INTERNO) --- */
        .menu-footer {
            position: absolute;
            bottom: 3rem;
            text-align: center;
            opacity: 0;
            transition: opacity 0.5s ease;
            transition-delay: 0.7s;
        }

        .fullscreen-menu.menu-active .menu-footer {
            opacity: 1;
        }

        .menu-footer p {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: var(--color-taupe);
            margin-bottom: 0.8rem;
        }

        .menu-socials {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
        }

        .menu-socials a {
            font-size: 0.85rem;
            color: var(--color-chocolate);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
        }

        .menu-socials a:hover {
            color: var(--color-peach-blush);
        }

        /* Simulación de un contenido de fondo para notar el efecto */
        .placeholder-content {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: var(--color-taupe);
            font-size: 0.9rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <!-- Encabezado de la Página -->
    <header class="header-navigation">
        <a href="#" class="mini-logo">Umer<span>a</span></a>
        <button class="btn-open-menu" onclick="toggleMenu()">
            <span></span>
            <span></span>
        </button>
    </header>

    <!-- Menú Desplegable (Slide de arriba a abajo) -->
    <nav class="fullscreen-menu" id="navMenu">
        <!-- Botón cerrar -->
        <button class="btn-close-menu" onclick="toggleMenu()">Cerrar ✕</button>

        <!-- Lista de opciones premium -->
        <ul class="menu-links-list">
            <li><a href="#" class="menu-item">Shop All</a></li>
            <li><a href="#" class="menu-item">Colecciones</a></li>
            <li><a href="#" class="menu-item">The Feel Blog</a></li>
            <li><a href="#" class="menu-item">Nuestro Manifiesto</a></li>
        </ul>

        <!-- Footer del menú con redes -->
        <div class="menu-footer">
            <p>Conecta con Umera</p>
            <div class="menu-socials">
                <a href="#" target="_blank">Instagram</a>
                <a href="#" target="_blank">Pinterest</a>
                <a href="#" target="_blank">WhatsApp</a>
            </div>
        </div>
    </nav>

    <!-- Espacio temporal para ver el fondo detrás del menú -->
    <div class="placeholder-content">
        <p>Espacio principal de la tienda (Umera)</p>
    </div>

    <script>
        function toggleMenu() {
            const menu = document.getElementById('navMenu');
            // Intercambia la clase para activar o desactivar el slide
            menu.classList.toggle('menu-active');
        }
    </script>

</body>
</html>
